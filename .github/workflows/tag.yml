name: Tag

on: 
  push:
    branches:
        - '*'


jobs:
  build:
    name: "Build"
    defaults:
      run:
        working-directory: "./client/"


    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: version
      run: date +%Y%m%d%H%M%S