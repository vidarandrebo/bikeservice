name: Docker

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get version
        id: version
        uses: "./.github/actions/get-version"
        with:
          directory-build-props-file: "./Directory.Build.props"
          metadata-separator: "-"
          
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vidarandrebo/bikeservice:${{ steps.version.outputs.version-tag }}
            ghcr.io/vidarandrebo/bikeservice:latest
          labels: |
            org.opencontainers.image.url=https://github.com/vidarandrebo/bikeservice
            org.opencontainers.image.title=bikeservice
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.version.outputs.version-tag }}
            org.opencontainers.image.description=Bike service history web-app written with .NET and Vue
            org.opencontainers.image.source=https://github.com/vidarandrebo/bikeservice
