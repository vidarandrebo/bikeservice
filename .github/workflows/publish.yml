name: Publish

on:
  workflow_call:
    secrets:
      KNOWN_HOSTS:
        required: true
      SSH_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USERNAME:
        required: true

jobs:
  build-publish:
    environment: production
    name: "Build and Publish"

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup SSH
        uses: "./.github/actions/ssh"
        with:
          known-hosts: ${{secrets.KNOWN_HOSTS}}
          ssh-key: ${{secrets.SSH_KEY}}
          host: ${{secrets.SSH_HOST}}
          user: ${{secrets.SSH_USERNAME}}

      - name: Vue artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "client"
          path: "./static"

      - name: .NET artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "server"
          path: "./bin"

      - name: Make binary executable
        run: chmod +x ./bin/BikeService.Server

      - name: Copy frontend dist to output dir
        run: cp -R ./static bin/wwwroot

      - name: Remove previous version
        run: ssh ${{ secrets.SSH_HOST }} rm -r bikeservice

      - name: Transfer
        run: |
          rsync -r bin/ ${{ secrets.SSH_HOST }}:bikeservice
        shell: bash

      - name: SHA
        run: |
          echo ${{ github.event.pull_request.head.sha }} > commit-hash.txt
          rsync commit-hash.txt ${{ secrets.SSH_HOST }}:bs-commit-hash.txt
        shell: bash
